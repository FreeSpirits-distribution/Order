<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Free Spirits Distribution — Commande</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#faf5ef;--navy:#2c2420;--blue:#b87333;--blue-h:#9a5f2a;--green:#6b8f5e;--green-d:#4a7040;--orange:#d4a054;--red:#c45c5c;--gray-05:#f5f0ea;--gray-10:#e0d6cc;--gray-20:#b8a99a;--gray-40:#7a6e63;--gray-60:#3d3430;--card:#fff;--radius:8px;--shadow:0 2px 8px rgba(44,36,32,.1)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--gray-60);font-size:14px}

/* NAV */
.nav{background:var(--navy);color:#fff;display:flex;align-items:center;height:56px;padding:0 24px;position:sticky;top:0;z-index:1000}
.nav-logo{font-weight:800;font-size:20px;letter-spacing:-.5px}.nav-logo span{color:var(--blue);font-weight:400}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.nav-badge{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:16px;font-size:12px;font-weight:600}
.nav-cart{position:relative;cursor:pointer;background:var(--blue);border:none;color:#fff;padding:8px 18px;border-radius:var(--radius);font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;transition:background .15s}
.nav-cart:hover{background:var(--blue-h)}
.cart-count{background:#fff;color:var(--navy);font-size:11px;font-weight:800;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{background:var(--card);border-radius:12px;padding:40px;box-shadow:0 4px 20px rgba(44,36,32,.12);width:380px;max-width:90vw;text-align:center}
.login-box h1{font-size:24px;color:var(--navy);margin-bottom:4px}
.login-box p{color:var(--gray-40);font-size:13px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:1px solid var(--gray-10);border-radius:var(--radius);font-size:14px;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:var(--blue)}
.login-box button{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.login-box button:hover{background:var(--blue-h)}

/* FILTERS */
.filters{padding:16px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--card);border-bottom:1px solid var(--gray-10)}
.filters input,.filters select{padding:8px 14px;border:1px solid var(--gray-10);border-radius:var(--radius);font-size:13px;background:#fff}
.filters input:focus,.filters select:focus{outline:none;border-color:var(--blue)}
.filters .search{width:260px}
.filters .count{margin-left:auto;font-size:12px;color:var(--gray-40);font-weight:600}

/* CATALOG GRID */
.catalog{padding:20px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.product-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;gap:8px;transition:box-shadow .15s;border-left:4px solid var(--blue)}
.product-card:hover{box-shadow:0 4px 16px rgba(44,36,32,.15)}
.product-card.indisponible{border-left-color:var(--orange);opacity:.75}
.product-card.rupture{border-left-color:var(--red);opacity:.5;pointer-events:none}
.pc-header{display:flex;justify-content:space-between;align-items:start;gap:8px}
.pc-name{font-weight:700;font-size:15px;color:var(--navy);flex:1}
.pc-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.pc-badge.dispo{background:#e8f5e1;color:var(--green)}
.pc-badge.indispo{background:#fff3e0;color:var(--orange)}
.pc-badge.rupt{background:#ffeaea;color:var(--red)}
.pc-cat{font-size:12px;color:var(--gray-40);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.pc-details{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;color:var(--gray-40)}
.pc-details span{display:flex;justify-content:space-between}
.pc-details .val{color:var(--gray-60);font-weight:600}
.pc-prices{display:flex;gap:16px;padding-top:8px;border-top:1px solid var(--gray-05)}
.pc-price{text-align:center;flex:1}
.pc-price .label{font-size:10px;color:var(--gray-40);text-transform:uppercase;letter-spacing:.5px}
.pc-price .amount{font-size:18px;font-weight:800;color:var(--navy)}
.pc-price .amount small{font-size:11px;font-weight:400;color:var(--gray-40)}
.pc-order{display:flex;align-items:center;gap:8px;padding-top:8px}
.pc-qty{display:flex;align-items:center;border:1px solid var(--gray-10);border-radius:var(--radius);overflow:hidden}
.pc-qty button{width:34px;height:34px;border:none;background:var(--gray-05);color:var(--navy);font-size:16px;font-weight:700;cursor:pointer;transition:background .1s}
.pc-qty button:hover{background:var(--gray-10)}
.pc-qty input{width:48px;height:34px;text-align:center;border:none;border-left:1px solid var(--gray-10);border-right:1px solid var(--gray-10);font-size:14px;font-weight:700;color:var(--navy)}
.pc-qty input:focus{outline:none}
.pc-pcb{font-size:11px;color:var(--gray-40)}
.pc-add{margin-left:auto;padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
.pc-add:hover{background:var(--green-d)}
.pc-add.added{background:var(--gray-20);cursor:default}

/* CART PANEL */
.cart-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:2000}
.cart-overlay.open{display:flex;justify-content:flex-end}
.cart-panel{background:var(--card);width:480px;max-width:95vw;height:100vh;overflow-y:auto;padding:24px;box-shadow:-4px 0 20px rgba(0,0,0,.2)}
.cart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.cart-head h2{font-size:20px;color:var(--navy)}
.cart-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--gray-40);padding:4px 8px}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--gray-05)}
.ci-info{flex:1}
.ci-name{font-weight:700;font-size:13px;color:var(--navy)}
.ci-detail{font-size:11px;color:var(--gray-40)}
.ci-qty{display:flex;align-items:center;gap:6px;margin:0 12px}
.ci-qty button{width:26px;height:26px;border:1px solid var(--gray-10);border-radius:4px;background:#fff;cursor:pointer;font-size:14px;font-weight:700;color:var(--navy)}
.ci-qty span{font-weight:700;min-width:20px;text-align:center}
.ci-price{font-weight:700;font-size:13px;color:var(--navy);min-width:70px;text-align:right}
.ci-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:18px;margin-left:8px;padding:2px 6px}
.cart-total{padding:16px 0;border-top:2px solid var(--navy);margin-top:12px;display:flex;justify-content:space-between;font-size:18px;font-weight:800;color:var(--navy)}
.cart-note{margin-top:16px}
.cart-note label{font-size:12px;font-weight:600;color:var(--gray-40);display:block;margin-bottom:4px}
.cart-note textarea{width:100%;padding:10px;border:1px solid var(--gray-10);border-radius:var(--radius);font-size:13px;resize:vertical;min-height:60px}
.cart-submit{width:100%;margin-top:16px;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;transition:background .15s}
.cart-submit:hover{background:var(--blue-h)}
.cart-empty{text-align:center;padding:40px 0;color:var(--gray-40)}

/* CONFIRM */
.confirm-screen{display:none;text-align:center;padding:80px 24px}
.confirm-screen .icon{font-size:64px;margin-bottom:16px}
.confirm-screen h2{font-size:24px;color:var(--navy);margin-bottom:8px}
.confirm-screen p{color:var(--gray-40);font-size:14px;max-width:500px;margin:0 auto}
.confirm-screen button{margin-top:24px;padding:12px 32px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer}

@media(max-width:600px){
.catalog{grid-template-columns:1fr;padding:12px}
.filters{padding:12px;gap:8px}
.filters .search{width:100%}
.cart-panel{width:100vw}
.pc-details{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="login-screen">
<div class="login-box">
<h1>free<span>SPIRITS</span></h1>
<p>Catalogue &amp; Commande en ligne</p>
<input type="text" id="client-name" placeholder="Nom de votre établissement">
<input type="email" id="client-email" placeholder="Votre adresse email">
<input type="tel" id="client-tel" placeholder="Téléphone (facultatif)">
<button onclick="enterCatalog()">Accéder au catalogue</button>
<div id="login-err" style="color:var(--red);font-size:12px;margin-top:8px"></div>
</div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">

<!-- NAV -->
<div class="nav">
<div class="nav-logo">free<span>SPIRITS</span></div>
<div class="nav-right">
<div class="nav-badge" id="client-badge"></div>
<button class="nav-cart" onclick="openCart()">
&#128722; Panier <span class="cart-count" id="cart-count">0</span>
</button>
</div>
</div>

<!-- FILTERS -->
<div class="filters">
<input type="text" class="search" id="f-search" placeholder="Rechercher un produit..." oninput="renderCatalog()">
<select id="f-cat" onchange="renderCatalog()"><option value="">Toutes catégories</option></select>
<select id="f-dispo" onchange="renderCatalog()">
<option value="">Tous statuts</option>
<option value="DISPONIBLE">Disponible</option>
<option value="INDISPONIBLE">Indisponible</option>
</select>
<span class="count" id="f-count"></span>
</div>

<!-- CATALOG -->
<div class="catalog" id="catalog-grid"></div>

<!-- CART OVERLAY -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart(event)">
<div class="cart-panel" onclick="event.stopPropagation()">
<div class="cart-head">
<h2>&#128722; Votre commande</h2>
<button class="cart-close" onclick="closeCart()">&times;</button>
</div>
<div id="cart-items"></div>
<div class="cart-total" id="cart-total" style="display:none">
<span>Total HT</span><span id="cart-total-val"></span>
</div>
<div class="cart-note">
<label>Notes / instructions</label>
<textarea id="cart-notes" placeholder="Conditions de livraison, remarques..."></textarea>
</div>
<button class="cart-submit" onclick="submitOrder()">&#9993; Envoyer la commande</button>
</div>
</div>

<!-- CONFIRMATION -->
<div class="confirm-screen" id="confirm-screen">
<div class="icon">&#10004;&#65039;</div>
<h2>Commande envoyée !</h2>
<p>Votre commande a été transmise à l'équipe Free Spirits Distribution. Vous recevrez une confirmation par email.</p>
<button onclick="resetOrder()">Nouvelle commande</button>
</div>

</div>

<script>
// ========= CONFIG =========
const SUPABASE_URL = "https://ajukuwrznhfsfdeejdkl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqdWt1d3J6bmhmc2ZkZWVqZGtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwOTM4MzgsImV4cCI6MjA5MDY2OTgzOH0.fHCVO12OutfO1PNM97s3jRVjFVPlGLl7wBmZA4gbM7s";
const ORDER_EMAIL = "commande@free-spirits.fr";

let catalog = [];
let cart = [];
let clientInfo = {name:'',email:'',tel:''};

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

// ========= LOGIN =========
function enterCatalog(){
  var name = document.getElementById('client-name').value.trim();
  var email = document.getElementById('client-email').value.trim();
  var tel = document.getElementById('client-tel').value.trim();
  var err = document.getElementById('login-err');
  if(!name){err.textContent='Veuillez indiquer le nom de votre établissement.';return}
  if(!email||!email.includes('@')){err.textContent='Veuillez indiquer une adresse email valide.';return}
  clientInfo = {name:name,email:email,tel:tel};
  document.getElementById('client-badge').textContent = name;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  loadCatalog();
}

// ========= CATALOG =========
async function loadCatalog(){
  try{
    var res = await fetch(SUPABASE_URL+'/rest/v1/produits?select=*&order=category,name&dispo=neq.RUPTURE',{
      headers:{'apikey':SUPABASE_KEY}
    });
    if(!res.ok){console.error('Catalog error:',res.status);return}
    catalog = await res.json();
    // Build category filter
    var cats = new Set();
    catalog.forEach(function(p){if(p.category)cats.add(p.category)});
    var sel = document.getElementById('f-cat');
    sel.innerHTML = '<option value="">Toutes catégories</option>';
    [...cats].sort().forEach(function(c){sel.innerHTML+='<option value="'+esc(c)+'">'+esc(c)+'</option>'});
    renderCatalog();
  }catch(e){console.error('Catalog fetch error:',e)}
}

function renderCatalog(){
  var catF = document.getElementById('f-cat').value;
  var dispoF = document.getElementById('f-dispo').value;
  var q = (document.getElementById('f-search').value||'').toLowerCase();
  var filtered = catalog.filter(function(p){
    if(catF && p.category!==catF) return false;
    if(dispoF && p.dispo!==dispoF) return false;
    if(q && !p.name.toLowerCase().includes(q) && !(p.ref||'').toLowerCase().includes(q) && !p.category.toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('f-count').textContent = filtered.length+' produit(s)';
  var grid = document.getElementById('catalog-grid');
  if(!filtered.length){
    grid.innerHTML='<div style="text-align:center;padding:60px;color:var(--gray-40);grid-column:1/-1">Aucun produit trouvé</div>';
    return;
  }
  grid.innerHTML = filtered.map(function(p){
    var cls = p.dispo==='INDISPONIBLE'?'indisponible':p.dispo==='RUPTURE'?'rupture':'';
    var badgeCls = p.dispo==='DISPONIBLE'?'dispo':p.dispo==='INDISPONIBLE'?'indispo':'rupt';
    var badgeTxt = p.dispo==='DISPONIBLE'?'Disponible':p.dispo==='INDISPONIBLE'?'Indisponible':'Rupture';
    var inCart = cart.find(function(c){return c.id===p.id});
    return '<div class="product-card '+cls+'">'+
      '<div class="pc-header">'+
        '<div class="pc-name">'+esc(p.name)+'</div>'+
        '<span class="pc-badge '+badgeCls+'">'+badgeTxt+'</span>'+
      '</div>'+
      '<div class="pc-cat">'+esc(p.category)+(p.ref?' — '+esc(p.ref):'')+'</div>'+
      '<div class="pc-details">'+
        '<span>Vol. <b class="val">'+(p.vol||'-')+' cl</b></span>'+
        '<span>TAV <b class="val">'+(p.tav||'-')+' %</b></span>'+
        '<span>Classif. <b class="val">'+esc(p.classif||'-')+'</b></span>'+
        '<span>PCB <b class="val">'+p.pcb+' bt</b></span>'+
      '</div>'+
      '<div class="pc-prices" style="grid-template-columns:repeat(5,1fr);display:grid;gap:4px">'+
        '<div class="pc-price"><div class="label">HDHT</div><div class="amount" style="font-size:14px">'+((p.hdht||0).toFixed(2))+' <small>&euro;</small></div></div>'+
        '<div class="pc-price"><div class="label">Droits</div><div class="amount" style="font-size:14px">'+((p.droits||0).toFixed(4))+' <small>&euro;</small></div></div>'+
        '<div class="pc-price"><div class="label">CSS</div><div class="amount" style="font-size:14px">'+((p.css||0).toFixed(2))+' <small>&euro;</small></div></div>'+
        '<div class="pc-price"><div class="label">Prix HT</div><div class="amount" style="font-size:15px;color:var(--blue)">'+((p.prix_ht||0).toFixed(2))+' <small>&euro;</small></div></div>'+
        '<div class="pc-price"><div class="label">PVC TTC</div><div class="amount" style="font-size:15px">'+((p.pvc_ttc||0).toFixed(2))+' <small>&euro;</small></div></div>'+
      '</div>'+
      '<div class="pc-order">'+
        '<div class="pc-qty">'+
          '<button onclick="changeQty(this,-1,'+p.id+')">-</button>'+
          '<input type="number" id="qty-'+p.id+'" value="'+(inCart?inCart.qty:0)+'" min="0" onchange="setQty('+p.id+',this.value)">'+
          '<button onclick="changeQty(this,1,'+p.id+')">+</button>'+
        '</div>'+
        '<span class="pc-pcb">x '+p.pcb+' bt/colis</span>'+
        (p.dispo!=='INDISPONIBLE'?
          '<button class="pc-add'+(inCart?' added':'')+'" onclick="addToCart('+p.id+')">'+(inCart?'&#10003; Ajouté':'+ Ajouter')+'</button>':
          '<button class="pc-add" style="background:var(--orange)" onclick="addToCart('+p.id+')">&#9888; Indisponible</button>'
        )+
      '</div>'+
    '</div>';
  }).join('');
}

// ========= CART =========
function changeQty(btn,delta,id){
  var input = document.getElementById('qty-'+id);
  var val = parseInt(input.value)||0;
  val = Math.max(0,val+delta);
  input.value = val;
  var item = cart.find(function(c){return c.id===id});
  if(item) item.qty = val;
  if(item && val===0){cart = cart.filter(function(c){return c.id!==id});renderCatalog()}
  updateCartCount();
}

function setQty(id,val){
  val = Math.max(0,parseInt(val)||0);
  document.getElementById('qty-'+id).value = val;
  var item = cart.find(function(c){return c.id===id});
  if(item){item.qty=val;if(val===0){cart=cart.filter(function(c){return c.id!==id});renderCatalog()}}
  updateCartCount();
}

function addToCart(id){
  var p = catalog.find(function(x){return x.id===id});
  if(!p) return;
  if(p.dispo==='INDISPONIBLE'){
    if(!confirm(p.name+' est actuellement indisponible. Voulez-vous quand même l\'ajouter à votre commande ?')) return;
  }
  var existing = cart.find(function(c){return c.id===id});
  var qtyInput = document.getElementById('qty-'+id);
  var qty = parseInt(qtyInput.value)||0;
  if(qty===0) qty=1;
  if(existing){
    existing.qty = qty;
  }else{
    cart.push({id:p.id,ref:p.ref,name:p.name,category:p.category,vol:p.vol,tav:p.tav,pcb:p.pcb,hdht:p.hdht,droits:p.droits,css:p.css,prix_ht:p.prix_ht,pvc_ttc:p.pvc_ttc,qty:qty,dispo:p.dispo});
  }
  qtyInput.value = qty;
  updateCartCount();
  renderCatalog();
}

function updateCartCount(){
  var total = cart.reduce(function(s,c){return s+c.qty},0);
  document.getElementById('cart-count').textContent = total;
}

function openCart(){
  renderCart();
  document.getElementById('cart-overlay').className = 'cart-overlay open';
}

function closeCart(e){
  if(e && e.target && e.target!==document.getElementById('cart-overlay')) return;
  document.getElementById('cart-overlay').className = 'cart-overlay';
}

function renderCart(){
  var container = document.getElementById('cart-items');
  if(!cart.length){
    container.innerHTML = '<div class="cart-empty">Votre panier est vide</div>';
    document.getElementById('cart-total').style.display = 'none';
    return;
  }
  var totalHT = 0;
  container.innerHTML = cart.map(function(item){
    var lineTotal = item.qty * item.prix_ht;
    totalHT += lineTotal;
    return '<div class="cart-item">'+
      '<div class="ci-info">'+
        '<div class="ci-name">'+esc(item.name)+'</div>'+
        '<div class="ci-detail">'+esc(item.category)+' — '+item.prix_ht.toFixed(2)+' &euro; HT/u &times; '+item.pcb+' bt/colis</div>'+
      '</div>'+
      '<div class="ci-qty">'+
        '<button onclick="cartQty('+item.id+',-1)">-</button>'+
        '<span>'+item.qty+'</span>'+
        '<button onclick="cartQty('+item.id+',1)">+</button>'+
      '</div>'+
      '<div class="ci-price">'+lineTotal.toFixed(2)+' &euro;</div>'+
      '<button class="ci-del" onclick="removeFromCart('+item.id+')">&times;</button>'+
    '</div>';
  }).join('');
  document.getElementById('cart-total').style.display = 'flex';
  document.getElementById('cart-total-val').textContent = totalHT.toFixed(2)+' €';
}

function cartQty(id,delta){
  var item = cart.find(function(c){return c.id===id});
  if(!item) return;
  item.qty = Math.max(1,item.qty+delta);
  renderCart();
  updateCartCount();
}

function removeFromCart(id){
  cart = cart.filter(function(c){return c.id!==id});
  renderCart();
  updateCartCount();
  renderCatalog();
}

// ========= SUBMIT ORDER =========
function submitOrder(){
  if(!cart.length){alert('Votre panier est vide.');return}
  var notes = document.getElementById('cart-notes').value.trim();
  // Build order text
  var totalHT = 0;
  var lines = cart.map(function(item,i){
    var lt = item.qty * item.prix_ht;
    totalHT += lt;
    return (i+1)+'. '+item.name+' ('+item.category+')'+
      '\n   Réf: '+(item.ref||'-')+' | Vol: '+(item.vol||'-')+'cl | TAV: '+(item.tav||'-')+'%'+
      '\n   HDHT: '+(item.hdht||0).toFixed(2)+'€ | Droits: '+(item.droits||0).toFixed(4)+'€ | CSS: '+(item.css||0).toFixed(2)+'€ | HT: '+item.prix_ht.toFixed(2)+'€'+
      '\n   Qté: '+item.qty+' colis (x'+item.pcb+' bt) | Total HT: '+lt.toFixed(2)+'€';
  });
  var subject = 'Commande - '+clientInfo.name+' - '+new Date().toLocaleDateString('fr-FR');
  var body = '=== COMMANDE FREE SPIRITS DISTRIBUTION ===\n\n'+
    'Client: '+clientInfo.name+'\n'+
    'Email: '+clientInfo.email+'\n'+
    (clientInfo.tel?'Tél: '+clientInfo.tel+'\n':'')+
    'Date: '+new Date().toLocaleDateString('fr-FR')+' '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+'\n\n'+
    '--- PRODUITS COMMANDÉS ---\n\n'+
    lines.join('\n\n')+'\n\n'+
    '--- TOTAL ---\n'+
    'Total HT: '+totalHT.toFixed(2)+' €\n'+
    'Nombre de références: '+cart.length+'\n'+
    'Nombre de colis: '+cart.reduce(function(s,c){return s+c.qty},0)+'\n\n'+
    (notes?'--- NOTES ---\n'+notes+'\n\n':'')+
    '---\nCommande passée via le catalogue en ligne Free Spirits Distribution';

  var mailto = 'mailto:'+ORDER_EMAIL+
    '?subject='+encodeURIComponent(subject)+
    '&body='+encodeURIComponent(body)+
    '&cc='+encodeURIComponent(clientInfo.email);

  window.location.href = mailto;

  // Show confirmation
  setTimeout(function(){
    document.getElementById('app').querySelector('.nav').style.display='none';
    document.getElementById('app').querySelector('.filters').style.display='none';
    document.getElementById('catalog-grid').style.display='none';
    document.getElementById('cart-overlay').className='cart-overlay';
    document.getElementById('confirm-screen').style.display='block';
  },500);
}

function resetOrder(){
  cart = [];
  updateCartCount();
  document.getElementById('cart-notes').value='';
  document.getElementById('confirm-screen').style.display='none';
  document.getElementById('app').querySelector('.nav').style.display='flex';
  document.getElementById('app').querySelector('.filters').style.display='flex';
  document.getElementById('catalog-grid').style.display='grid';
  renderCatalog();
}
</script>
</body>
</html>
